<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة العمارة الذكية</title>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get() {
                return currentFetch;
              },
              set(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                get() {
                  return currentFetch;
                },
                set(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            } catch (err2) {
              console.warn('Could not patch fetch:', err2);
            }
          }
        } catch (e) {
          console.warn('Fetch safety patch error:', e);
        }
      })();
    </script>
  </head>
  <body class="bg-[#0F0F0F] text-[#E0E0E0] font-sans antialiased min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
